# .github/workflows/agent.yml
# Runs your business agent every day at 8 AM UTC — free on GitHub Actions.
#
# Setup:
#   1. Push this repo to GitHub (public or private)
#   2. Go to Settings → Secrets and variables → Actions
#   3. Add each secret listed in the "env" section below
#   4. The agent will run automatically every morning

name: Business Agent Daily Run

on:
  schedule:
    - cron: "0 8 * * *"   # 8:00 AM UTC every day
  workflow_dispatch:        # also allows manual trigger from GitHub UI

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic requests PyJWT

      - name: Restore state file
        uses: actions/cache@v4
        with:
          path: state.json
          key: agent-state-${{ github.run_number }}
          restore-keys: |
            agent-state-

      - name: Run agent
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          CMS_URL:             ${{ secrets.CMS_URL }}
          CMS_API_KEY:         ${{ secrets.CMS_API_KEY }}
          CMS_TYPE:            ${{ secrets.CMS_TYPE }}
          ANALYTICS_SITE_ID:   ${{ secrets.ANALYTICS_SITE_ID }}
          ANALYTICS_API_KEY:   ${{ secrets.ANALYTICS_API_KEY }}
          ADSENSE_CODE:        ${{ secrets.ADSENSE_CODE }}
          AFFILIATE_TAG:       ${{ secrets.AFFILIATE_TAG }}
        run: python agent.py

      - name: Commit updated state
        run: |
          git config user.name  "Business Agent"
          git config user.email "agent@noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "chore: agent run $(date -u '+%Y-%m-%d')"
          git push
